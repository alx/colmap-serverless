name: Publish Docker images

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # GitHub Release creation
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io/alx/colmap-serverless

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cuda12.5 is the default/latest variant — also tagged as <version> and latest
      - name: Build and push cuda12.5 (ubuntu24.04)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=12.5.1
            UBUNTU_VERSION=24.04
          tags: |
            ${{ env.REGISTRY }}:${{ env.VERSION }}-cuda12.5
            ${{ env.REGISTRY }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}:buildcache,mode=max

      - name: Build and push cuda12.4 (ubuntu22.04)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=12.4.1
            UBUNTU_VERSION=22.04
          tags: |
            ${{ env.REGISTRY }}:${{ env.VERSION }}-cuda12.4
          cache-from: type=registry,ref=${{ env.REGISTRY }}:buildcache

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
