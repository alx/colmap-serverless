name: Build and Publish

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io/alx/colmap-serverless

jobs:
  build-cuda125:
    name: Build cuda12.5 (ubuntu24.04)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=12.5.1
            UBUNTU_VERSION=24.04
          tags: |
            ${{ env.REGISTRY }}:${{ github.ref_name }}-cuda12.5
            ${{ env.REGISTRY }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}:latest
          cache-from: type=gha,scope=cuda12.5
          cache-to: type=gha,mode=max,scope=cuda12.5

  build-cuda124:
    name: Build cuda12.4 (ubuntu22.04)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=12.4.1
            UBUNTU_VERSION=22.04
          tags: |
            ${{ env.REGISTRY }}:${{ github.ref_name }}-cuda12.4
          cache-from: type=gha,scope=cuda12.4
          cache-to: type=gha,mode=max,scope=cuda12.4

  release:
    name: Create GitHub Release
    needs: [build-cuda125, build-cuda124]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          cat > /tmp/release-notes.md << EOF
          ## Docker Images

          \`\`\`
          ghcr.io/alx/colmap-serverless:${VERSION}-cuda12.5  (Ubuntu 24.04, default)
          ghcr.io/alx/colmap-serverless:${VERSION}-cuda12.4  (Ubuntu 22.04)
          ghcr.io/alx/colmap-serverless:${VERSION}            -> cuda12.5
          ghcr.io/alx/colmap-serverless:latest                -> cuda12.5
          \`\`\`
          EOF
          gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/release-notes.md
